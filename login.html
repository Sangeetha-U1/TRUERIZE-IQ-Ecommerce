<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Truerize IQ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111,#333);
    font-family:Arial;
}

.box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    height:45px;
    border-radius:10px !important;
}

.btn-main{
    width:100%;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.btn-main:hover{
    background:#ff3c78;
}

.switch{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    cursor:pointer;
    color:#555;
}

.switch span{
    color:#ff3c78;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>

        <input class="form-control mb-2" id="loginUser" placeholder="Username">
        <input class="form-control mb-2" id="loginPass" type="password" placeholder="Password">

        <button class="btn-main" onclick="login()">Login</button>

        <div class="switch" onclick="toggleForm()">
            Don't have account? <span>Sign Up</span>
        </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none;">
        <h2>Sign Up</h2>

        <input class="form-control mb-2" id="signUser" placeholder="Create Username">
        <input class="form-control mb-2" id="signPass" type="password" placeholder="Create Password">

        <button class="btn-main" onclick="signup()">Create Account</button>

        <div class="switch" onclick="toggleForm()">
            Already have account? <span>Login</span>
        </div>
    </div>

</div>

<script>

// SWITCH FORM
function toggleForm(){
    let login = document.getElementById("loginForm");
    let signup = document.getElementById("signupForm");

    if(login.style.display === "none"){
        login.style.display = "block";
        signup.style.display = "none";
    } else {
        login.style.display = "none";
        signup.style.display = "block";
    }
}

// SIGNUP
function signup(){
    let u = document.getElementById("signUser").value;
    let p = document.getElementById("signPass").value;

    if(!u || !p){
        alert("Fill all fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let exists = users.find(x => x.user === u);

    if(exists){
        alert("Username already exists!");
        return;
    }

    users.push({user:u, pass:p});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Account created successfully!");
    toggleForm();
}

// LOGIN
function login(){
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let match = users.find(x => x.user === u && x.pass === p);

    if(match){
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("currentUser", u);
        window.location.href = "index.html";
    } else {
        alert("Invalid credentials!");
    }
}

</script>

</body>
</html>
