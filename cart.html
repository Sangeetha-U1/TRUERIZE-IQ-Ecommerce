<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Side Cart - Truerize IQ</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
}

/* CART BUTTON */
.open-cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:#000;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  z-index:1001;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

/* SIDE CART */
#cartBox{
  position:fixed;
  top:0;
  right:-400px;
  width:360px;
  height:100%;
  background:#fff;
  box-shadow:-3px 0 15px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:1000;
  padding:15px;
  overflow-y:auto;
}

/* ITEM */
.item{
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* QTY */
.qty-btn{
  width:30px;
  height:30px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:5px;
}

/* CHECKOUT */
.checkout-btn{
  width:100%;
  padding:10px;
  background:green;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- OPEN CART BUTTON -->
<button class="open-cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</button>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleCart()"></div>

<!-- SIDE CART -->
<div id="cartBox">

<h4>Your Cart</h4>
<hr>

<div id="cartItems"></div>

<hr>

<h5>Total: ₹<span id="total">0</span></h5>

<button class="checkout-btn" onclick="checkout()">
Checkout
</button>

</div>

<!-- SAMPLE PRODUCTS -->
<div class="container mt-5">

<h2>Products</h2>

<div class="row">

<div class="col-md-4">
<div class="card p-3">

<h5>T-Shirt</h5>
<p>₹400</p>

<div class="d-flex justify-content-between align-items-center">

<div>
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button class="btn btn-dark"
data-name="T-Shirt"
data-price="400"
onclick="addToCart(this)">
Add
</button>

</div>

</div>
</div>

<div class="col-md-4">
<div class="card p-3">

<h5>Jeans</h5>
<p>₹1200</p>

<div class="d-flex justify-content-between align-items-center">

<div>
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button class="btn btn-dark"
data-name="Jeans"
data-price="1200"
onclick="addToCart(this)">
Add
</button>

</div>

</div>
</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// OPEN CLOSE CART
function toggleCart(){
  let box = document.getElementById("cartBox");
  let overlay = document.getElementById("overlay");

  if(box.style.right === "0px"){
    box.style.right = "-400px";
    overlay.style.display = "none";
  } else {
    box.style.right = "0px";
    overlay.style.display = "block";
  }

  renderCart();
}

// QTY ON PRODUCT CARD
function changeQty(btn,change){
  let card = btn.closest(".card");
  let qty = card.querySelector(".qty");

  let value = parseInt(qty.innerText);
  value += change;

  if(value < 1) value = 1;

  qty.innerText = value;
}

// ADD TO CART
function addToCart(btn){
  let card = btn.closest(".card");

  let name = btn.dataset.name;
  let price = parseFloat(btn.dataset.price);
  let qty = parseInt(card.querySelector(".qty").innerText);

  let existing = cart.find(i => i.name === name);

  if(existing){
    existing.qty += qty;
  } else {
    cart.push({name,price,qty});
  }

  saveCart();
  toggleCart();
}

// RENDER CART
function renderCart(){
  let box = document.getElementById("cartItems");
  box.innerHTML = "";

  let total = 0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    box.innerHTML += `
      <div class="item">
        <h6>${item.name}</h6>
        <p>₹${item.price} x ${item.qty}</p>

        <div class="d-flex gap-2">
          <button class="qty-btn" onclick="updateQty(${i},-1)">-</button>
          <span>${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${i},1)">+</button>

          <button class="btn btn-sm btn-danger ms-auto" onclick="removeItem(${i})">X</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

// UPDATE QTY IN CART
function updateQty(i, change){
  cart[i].qty += change;
  if(cart[i].qty < 1) cart[i].qty = 1;
  saveCart();
  renderCart();
}
// REMOVE ITEM
function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

// SAVE CART
function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
  updateCartCount();
}

// CART COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = cart.reduce((sum, item) => sum + item.qty, 0);

  let el = document.getElementById("cart-count");
  if (el) el.innerText = total;
}
// CHECKOUT
function checkout(){
  alert("Order Placed 🎉");
  localStorage.removeItem("cart");
  cart = [];
  saveCart();
  toggleCart();
}

updateCartCount();
window.addEventListener("storage", function () {
  updateCartCount();
});
</script>

</body>
</html>
